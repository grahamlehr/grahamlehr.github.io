<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norway Podcasts</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0E1A; }
    a { font-family: inherit; }
    .wb { animation: wave 1.5s ease-in-out infinite; transform-origin: center bottom; }
    @keyframes wave { 0%, 100% { transform: scaleY(0.4); } 50% { transform: scaleY(1.15); } }
    @media (prefers-reduced-motion: reduce) { .wb { animation: none !important; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ─── Data ─────────────────────────────────────────────────────────────────

    const EPISODES = [
      {
        id: 1,
        title: "Norway's Energy Future: Electrification, Wind and Hydrogen (with Nils Klippenberg, Siemens Norge)",
        show: "NTNU Energy Transition Podcast",
        description:
          "In this episode of the NTNU Energy Transition podcast, we sit down with Nils Klippenberg, CEO of Siemens Norway, to discuss the current state and future direction of Norway's energy transition. As Norway aims to meet its ambitious climate goals, we explore the challenges and opportunities within the industry, focusing on the critical role of electrification, offshore wind, and hydrogen. Nils offers an insider's view on how Norway can leverage its resources and innovation to lead in the global energy landscape, while also addressing the broader European context.",
        duration: "58m",
        date: "Aug 2023",
        category: "Energy",
        accent: "#10B981",
        apple:   "https://podcasts.apple.com/us/podcast/72-norways-energy-future-electrification-wind-and/id1564538733?i=1000666324271",
        spotify: "https://open.spotify.com/episode/2L9QeZjOPQwvyhKUhHkj5I?si=JZUfvkJPTA-M40JN3w5wbw",
        web:     "https://open.spotify.com/embed/episode/2L9QeZjOPQwvyhKUhHkj5I?utm_source=generator&si=282e1e94920f4872",
      },
      {
        id: 2,
        title: "Equinor’s M&A Strategy: Can Oil and Renewables Coexist? (with Per Arne Solend, Equinor)",
        show: "NTNU Energy Transition Podcast",
        description:
          "In this episode, we examine Equinor’s mergers and acquisitions (M&A) strategy and explore a key question: Can oil and renewables coexist within the company and in Norway’s broader energy landscape? Per Arne Solend, VP of M&A and Insights at Equinor, joins us. He shares his perspective on how the company navigates fossil fuels and renewables acquisitions. We discuss the rationale behind Equinor’s recent investments, the role of M&A in the energy transition, and how the company balances its legacy oil and gas operations with its push into offshore wind, batteries, and emerging low-carbon technologies. Co-hosting this episode is Martina Fantini, a PhD researcher at NTNU specializing in sustainable aviation.",
        duration: "47m",
        date: "Feb 2026",
        category: "Energy",
        accent: "#10B981",
        apple:   "https://podcasts.apple.com/us/podcast/82-equinors-m-a-strategy-can-oil-and-renewables/id1564538733?i=1000689602524",
        spotify: "https://open.spotify.com/episode/5XTwZ7mRwhhA8LErVLe0Vf?si=b828f33034a04229",
        web: "https://open.spotify.com/embed/episode/5XTwZ7mRwhhA8LErVLe0Vf?utm_source=generator&si=0bd5c467962145b2",
      },
      {
        id: 3,
        title: "Europe's energy future: Perspective from Norway's PM Jonas Støre",
        show: "GZERO World with Ian Bremmer",
        description:
          "Ian Bremmer discusses the critical themes of energy security and geopolitical stability in Europe amidst ongoing global challenges with Norwegian Prime Minister Jonas Støre on the sidelines of the Munich Security Conference. Støre outlines Norway's ambitious plan to transition from oil and gas to renewable energy sources by 2030. This transition is not just a local endeavor but a necessary shift for Europe, aiming to address both the climate crisis and geopolitical tensions by reducing dependency on fossil fuels.   With Europe cutting off nearly all Russian energy imports, Norway has become a key supplier. Støre emphasizes the importance of technological innovation, international cooperation, and the pivotal role of the market economy in facilitating the transition towards green energy. “You cannot make it unless you make the market economy be at the service of the transition,” Jonas Gahr Støre explains. Moreover, he touches upon the broader implications for NATO and the transatlantic alliance, underscoring Europe's need to bolster its energy security and military capabilities to support Ukraine independently, if necessary.   The discussion also explores the broader context of democracy, social media's impact on society, and Norway's innovative approach to enhancing educational and social environments by limiting digital distractions among youth.",
        duration: "22m",
        date: "Mar 2024",
        category: "Energy",
        accent: "#10B981",
        apple:   "https://podcasts.apple.com/us/podcast/europes-energy-future-perspective-from-norways-pm-jonas/id1294461271?i=1000647755254",
        spotify: "https://open.spotify.com/episode/64Uf3qGuuGqkzBGrEsZFZ0?si=c0e0920debde482a",
        web:     "https://www.gzeromedia.com/podcast/gzero-world-podcast/europes-energy-future-perspective-from-norways-pm-jonas-store",
      },
      {
        id: 4,
        title: "New clues from old bones: Norwegian Vikings were very, very violent",
        show: "63 Degrees North",
        description:
          "We may think the Vikings were all the same, but it turns out that Viking violence wasn’t the same everywhere. New research shows that Norwegian Vikings were buried with 50 times more weapons—and had a lot more injuries—than their neighbours in Denmark. And there were other dramatic differences that researchers were able to uncover, even after the passage of more than a thousand years. This episode digs into what those differences might mean. Why were Norwegian Vikings more violent? Was something going on in their society? And were swords really the handguns of Viking society?",
        duration: "31m",
        date: "Apr 2025",
        category: "Science",
        accent: "#3B82F6",
        apple:   "https://podcasts.apple.com/us/podcast/new-clues-from-old-bones-norwegian-vikings-were-very/id1549833148?i=1000703620560",
        spotify: "https://open.spotify.com/episode/1rYriNReoJ0UUpj7UyHyr3?si=yOC8GuP3TziS_4jLluO2QA",
        web:     "https://shows.acast.com/6007ebf7f983a73284ec8ef0/67fe47e45f72beb5f79fb345",
      },
      {
        id: 5,
        title: "The Hunt for the King",
        show: "North by Norway",
        description:
          "The greatest drama of modern Norwegian history. What Norwegians call ‘Aprildagene’ – the fateful days of the 9th, 10th and 11th of April 1940. The greatest drama? How else to describe three days that start with King Haakon in his bed in the palace in central Oslo, and finish with the king and government hunted by the Nazis from town to village to farm. Three days that finish with them stumbling through snow as German planes strife and bomb the ground around them in an assassination attempt. ",
        duration: "29m",
        date: "Feb 2023",
        category: "History",
        accent: "#EF4444",
        apple:   "https://podcasts.apple.com/gb/podcast/the-hunt-for-the-king-part-1/id1645782174?i=1000599183494",
        spotify: "https://open.spotify.com/episode/4CI0Q727p5lw3gwTt8LMqM?si=TD7DE2r3TPWDYsQxNYuKsA",
        web:     "https://shows.acast.com/63234ba56042d8001323fb02/63dfd0470615f7001078a5a8",
      },
	  {
        id: 6,
        title: "Ten Inspiring Norwegians",
        show: "North by Norway",
        description:
          "Hear short sketches of 10 Norwegians whose stories I find inspiring. They are a real mixed bunch – but are all trailblazers! There’s courage, vision and optimism on show here. The five women are Eva Joly (fighter against corruption), Harriet Backer (painter), Katti Anker Møller (activist for women’s rights), Anne-Sofie Østvedt (Resistance leader during the Second World War) and May-Britt Moser (neuroscientist, winner of Nobel Prize). And the five men are Isak Saba (Sámi activist), Jan Egeland (humanitarian official), Vilhelm Bjerknes (weather scientist), Jan Garbarek (musician) and Edvard Moser (neuroscientist, Nobel Prize winner).",
        duration: "31m",
        date: "Nov 2022",
        category: "History",
        accent: "#EF4444",
        apple:   "https://podcasts.apple.com/gb/podcast/ten-inspiring-norwegians/id1645782174?i=1000586837215",
        spotify: "https://open.spotify.com/episode/1qXMWy1pha2HsJj2HujKw7?si=dCRc9OfDRxiag4WMbp6IGQ",
        web:     "https://shows.acast.com/63234ba56042d8001323fb02/63793b81f7200d0010a08d41",
      },
	  {
        id: 7,
        title: "Ten Inspiring Norwegians",
        show: "North by Norway",
        description:
          "NATO’s Secretary General, Jens Stoltenberg, has been on our screens throughout the Ukraine crisis, ashen-faced and compelling, but never sabre-rattling. This week’s podcast looks at the place of the Stoltenberg family in Norway and on the international stage. But first we have to consider Norway’s recent history as a peace broker. The country has often worked in the shadows, trying to create ‘a framework and an atmosphere conducive to negotiation’ – as one veteran put it, from 1993 and the Oslo Accords right up to this year’s low-key Libyan talks on Utøya. Yes, Utøya, the site of the terrible massacre, during which Jens Stoltenberg was Prime Minister. His father, Thorvald, was the leading diplomat of his generation, and his sister Camilla was Norway’s ‘Anthony Fauci’ during the Covid pandemic. ",
        duration: "31m",
        date: "Oct 2022",
        category: "History",
        accent: "#EF4444",
        apple:   "https://podcasts.apple.com/gb/podcast/the-stoltenbergs/id1645782174?i=1000582772108",
        spotify: "https://open.spotify.com/episode/4SQuWJk2YAfzDJINdl3Dq3?si=gOMUBaxgS9OWEeATVwDBDA",
        web:     "https://shows.acast.com/63234ba56042d8001323fb02/63471b1338763e00121ad004",
      },
	  {
        id: 8,
        title: "Troll!",
        show: "North by Norway",
        description:
          "The troll is ancient. A fearsome 3-headed troll is mentioned in one of the earliest poetic texts, the Edda, from about 1220. And Norse mythology is full of jötnar: supernatural troll-like beings. There are several thousand place names in Norway that start with the word Troll, most because of some ancient legend or folk tale that may now be lost. Over 300 valleys are called Trolldal. Rockfalls and groups of huge boulders that no human could have moved – people suspected these inexplicable formations in the mountains to be the work of superhuman arms. Even today, whenever we tremble on a dark path, when something stirs in the gloom of the forest, whenever our insecurity sets our primal instincts at odds with our over-hyped ration – the troll will be just behind us, just out of sight.",
        duration: "29m",
        date: "Dec 2022",
        category: "History",
        accent: "#EF4444",
        apple:   "https://podcasts.apple.com/gb/podcast/troll/id1645782174?i=1000589729405",
        spotify: "https://open.spotify.com/episode/5RBRUNGGTIv5P6Yl1HxoN8?si=BU4_r_pWTM2et2s21e4e-A",
        web:     "https://shows.acast.com/63234ba56042d8001323fb02/6394a898c427f5001188ec59",
      },
    ];

    const APPS = [
      { id: "apple",   name: "Apple Podcasts", color: "#BF5AF2" },
      { id: "spotify", name: "Spotify",        color: "#1DB954" },
      { id: "web",     name: "Episode page",   color: "#6B7280" },
    ];

    // ─── Shared styles ─────────────────────────────────────────────────────────

    const inp = {
      width: "100%",
      background: "#13192B",
      border: "1px solid rgba(255,255,255,0.1)",
      borderRadius: 8,
      padding: "10px 12px",
      color: "#E8EEF8",
      fontSize: 14,
      fontFamily: "inherit",
      outline: "none",
    };

    const btnGold = {
      background: "#F0B429",
      border: "none",
      borderRadius: 8,
      padding: "10px 14px",
      color: "#0A0E1A",
      fontSize: 13,
      fontWeight: 700,
      cursor: "pointer",
      fontFamily: "inherit",
    };

    const btnDim = {
      background: "rgba(255,255,255,0.06)",
      border: "1px solid rgba(255,255,255,0.11)",
      borderRadius: 8,
      padding: "10px 14px",
      color: "#C9D1D9",
      fontSize: 13,
      fontWeight: 600,
      cursor: "pointer",
      fontFamily: "inherit",
    };

    // ─── Small shared components ───────────────────────────────────────────────

    function ChevronDown({ size = 18, color = "currentColor", style }) {
      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke={color}
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          style={style}
        >
          <polyline points="6 9 12 15 18 9" />
        </svg>
      );
    }

    function Field({ label, children }) {
      return (
        <div style={{ marginBottom: 20 }}>
          <p style={{ fontSize: 11, color: "#6B7280", textTransform: "uppercase", letterSpacing: "0.09em", margin: "0 0 8px" }}>
            {label}
          </p>
          {children}
        </div>
      );
    }

    function Waveform() {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 4, height: 32 }}>
          {[0.35, 0.65, 1, 0.75, 0.5, 0.3].map((h, i) => (
            <span
              key={i}
              className="wb"
              style={{
                display: "block",
                width: 4,
                height: 32 * h,
                borderRadius: 2,
                background: "#F0B429",
                animationDelay: `${i * 0.1}s`,
              }}
            />
          ))}
        </div>
      );
    }

    // ─── Episode card ──────────────────────────────────────────────────────────

    function EpisodeCard({ episode, activeAppId }) {
      const [open, setOpen] = useState(false);
      const activeApp = APPS.find((a) => a.id === activeAppId);

      return (
        <div
          style={{
            background: "#13192B",
            borderRadius: 12,
            overflow: "hidden",
            borderLeft: `3px solid ${episode.accent}`,
          }}
        >
          <div
            onClick={() => setOpen((v) => !v)}
            style={{ display: "flex", alignItems: "center", padding: "14px 16px", cursor: "pointer", gap: 12 }}
          >
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 10, color: episode.accent, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.09em", marginBottom: 3 }}>
                {episode.category} · {episode.show}
              </div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#E8EEF8", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {episode.title}
              </div>
              <div style={{ fontSize: 12, color: "#8A96B0", marginTop: 3 }}>
                {episode.duration} · {episode.date}
              </div>
            </div>

            <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
              {activeApp && (
                <a
                  href={episode[activeAppId]}
                  target="_blank"
                  rel="noopener noreferrer"
                  onClick={(e) => e.stopPropagation()}
                  style={{
                    background: activeApp.color,
                    color: "#fff",
                    borderRadius: 8,
                    padding: "6px 14px",
                    fontSize: 13,
                    fontWeight: 700,
                    textDecoration: "none",
                  }}
                >
                  Open
                </a>
              )}
              <ChevronDown
                size={18}
                color="#4A5568"
                style={{ transform: open ? "rotate(180deg)" : "none", transition: "transform 0.2s", flexShrink: 0 }}
              />
            </div>
          </div>

          {open && (
            <div style={{ padding: "2px 16px 16px" }}>
              <p style={{ color: "#9CA9BE", fontSize: 14, lineHeight: 1.65, margin: "0 0 12px" }}>
                {episode.description}
              </p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {APPS.map((app) => (
                  <a
                    key={app.id}
                    href={episode[app.id]}
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{
                      display: "inline-block",
                      padding: "5px 11px",
                      background: "rgba(255,255,255,0.05)",
                      border: "1px solid rgba(255,255,255,0.1)",
                      borderRadius: 6,
                      color: "#C9D1D9",
                      fontSize: 12,
                      fontWeight: 500,
                      textDecoration: "none",
                    }}
                  >
                    {app.name}
                  </a>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Landing page ──────────────────────────────────────────────────────────

    function LandingPage({ title }) {
      const [activeApp, setActiveApp] = useState(null);

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", padding: "28px 16px 48px" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}>
              <Waveform />
            </div>
            <h1 style={{ color: "#E8EEF8", fontSize: 26, fontWeight: 700, margin: "0 0 8px", lineHeight: 1.2 }}>
              {title}
            </h1>
            <p style={{ color: "#8A96B0", fontSize: 14, margin: 0 }}>
              {EPISODES.length} handpicked episodes — tap any to open in your app
            </p>
          </div>

          <div style={{ marginBottom: 20 }}>
            <p style={{ fontSize: 11, color: "#6B7280", textTransform: "uppercase", letterSpacing: "0.09em", margin: "0 0 8px" }}>
              Choose your app
            </p>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
              {APPS.map((app) => {
                const on = activeApp === app.id;
                return (
                  <button
                    key={app.id}
                    onClick={() => setActiveApp(on ? null : app.id)}
                    style={{
                      padding: "7px 13px",
                      background: on ? app.color : "rgba(255,255,255,0.06)",
                      border: "none",
                      borderRadius: 20,
                      color: on ? "#fff" : "#8A96B0",
                      fontSize: 13,
                      fontWeight: 600,
                      cursor: "pointer",
                      fontFamily: "inherit",
                      transition: "all 0.15s",
                    }}
                  >
                    {app.name}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {EPISODES.map((ep) => (
              <EpisodeCard key={ep.id} episode={ep} activeAppId={activeApp} />
            ))}
          </div>
        </div>
      );
    }

    // ─── Setup panel ───────────────────────────────────────────────────────────

    function SetupPanel({ title, setTitle }) {
      const [qrUrl, setQrUrl] = useState("https://your-podcast-page.com");
      const [copied, setCopied] = useState(false);

      const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&bgcolor=FFFFFF&color=000000&data=${encodeURIComponent(qrUrl)}`;

      const copyUrl = () => {
        navigator.clipboard.writeText(qrUrl).catch(() => {});
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const downloadQR = async () => {
        const hiRes = qrSrc.replace("size=240x240", "size=800x800");
        try {
          const res = await fetch(hiRes);
          const blob = await res.blob();
          Object.assign(document.createElement("a"), {
            href: URL.createObjectURL(blob),
            download: "podcast-qr-code.png",
          }).click();
        } catch {
          window.open(hiRes, "_blank");
        }
      };

      const STEPS = [
        ["Host this file",     "Upload this HTML file to any static host — Netlify (drag and drop), GitHub Pages, or Cloudflare Pages. All free."],
        ["Enter your URL",     "Paste your live URL into the field above. The QR code regenerates instantly."],
        ["Share the QR code",  "Download and print it, embed in a slide deck, add to an email signature, or display on screen."],
      ];

      return (
        <div style={{ maxWidth: 480, margin: "0 auto", padding: "28px 16px 48px" }}>
          <h2 style={{ color: "#E8EEF8", fontSize: 20, fontWeight: 700, margin: "0 0 24px" }}>
            Setup
          </h2>

          <Field label="Page title">
            <input value={title} onChange={(e) => setTitle(e.target.value)} style={inp} />
          </Field>

          <Field label="Your deployed page URL">
            <input
              value={qrUrl}
              onChange={(e) => setQrUrl(e.target.value)}
              placeholder="https://your-site.com/listen"
              style={inp}
            />
          </Field>

          <div style={{ textAlign: "center", background: "#0A0E1A", borderRadius: 12, border: "1px solid rgba(240,180,41,0.2)", padding: "24px 24px 16px", marginBottom: 12 }}>
            <img src={qrSrc} alt="QR Code" width={200} height={200} style={{ display: "block", margin: "0 auto" }} />
            <p style={{ color: "#4A5568", fontSize: 12, margin: "12px 0 0" }}>
              Points to your page URL above
            </p>
          </div>

          <div style={{ display: "flex", gap: 8, marginBottom: 32 }}>
            <button onClick={copyUrl} style={{ ...btnDim, flex: 1, color: copied ? "#10B981" : "#C9D1D9" }}>
              {copied ? "✓ Copied" : "Copy URL"}
            </button>
            <button onClick={downloadQR} style={{ ...btnGold, flex: 1 }}>
              ↓ Download QR
            </button>
          </div>

          <div>
            <p style={{ fontSize: 11, color: "#6B7280", textTransform: "uppercase", letterSpacing: "0.09em", margin: "0 0 14px" }}>
              How to go live
            </p>
            {STEPS.map(([t, d], i) => (
              <div key={i} style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                <div style={{ width: 26, height: 26, borderRadius: "50%", background: "rgba(240,180,41,0.12)", color: "#F0B429", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {i + 1}
                </div>
                <div>
                  <p style={{ color: "#E8EEF8", fontSize: 14, fontWeight: 600, margin: "0 0 2px" }}>{t}</p>
                  <p style={{ color: "#8A96B0", fontSize: 13, margin: 0, lineHeight: 1.55 }}>{d}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Root ──────────────────────────────────────────────────────────────────

    function App() {
      const [tab, setTab] = useState("landing");
      const [title, setTitle] = useState("Norway Podcasts");

      
      return ( 
        <div style={{ fontFamily: "'Space Grotesk', system-ui, sans-serif", background: "#0A0E1A", minHeight: "100vh" }}>
          <div style={{ display: "flex", background: "#0A0E1A", borderBottom: "1px solid rgba(255,255,255,0.07)", padding: "0 16px", position: "sticky", top: 0, zIndex: 20 }}>
            {[["landing", ""].map(([id, label]) => (
              <button
                key={id}
                onClick={() => setTab(id)}
                style={{
                  background: "none", border: "none",
                  borderBottom: tab === id ? "2px solid #F0B429" : "2px solid transparent",
                  color: tab === id ? "#F0B429" : "#6B7280",
                  fontSize: 14, fontWeight: tab === id ? 700 : 500,
                  padding: "14px 16px", cursor: "pointer",
                  fontFamily: "inherit", transition: "color 0.15s",
                }}
              >
                {label}
              </button>
           ))}
          </div>

          {tab === "landing" ? (
            <LandingPage title={title} />
          ) : (
            <SetupPanel title={title} setTitle={setTitle} />
          )}
        </div>
      ); 
      
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>

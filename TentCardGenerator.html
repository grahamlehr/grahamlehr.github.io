      // ----------------------------------------------------
      // CanvasWorkspace Component
      // ----------------------------------------------------
      function CanvasWorkspace({
        width, height, isSymmetric, foldOrientation,
        canvasInstanceRef, selectedObject, setSelectedObject,
        previewData, autoShrinkText
      }) {
        const containerRef = useRef(null);
        const canvasRef = useRef(null);
        const [zoom, setZoom] = useState(1);

        useEffect(() => {
          if (!canvasRef.current) return;

          const canvas = new fabric.Canvas(canvasRef.current, {
            width: width,
            height: height,
            backgroundColor: '#ffffff',
            preserveObjectStacking: true,
          });

          canvasInstanceRef.current = canvas;

          const handleSelection = () => {
            setSelectedObject(canvas.getActiveObject());
          };

          canvas.on('selection:created', handleSelection);
          canvas.on('selection:updated', handleSelection);
          canvas.on('selection:cleared', () => setSelectedObject(null));

          return () => {
            canvas.off('selection:created', handleSelection);
            canvas.off('selection:updated', handleSelection);
            canvas.off('selection:cleared');
            canvas.dispose();
            canvasInstanceRef.current = null;
          };
        }, []);

        useEffect(() => {
          const canvas = canvasInstanceRef.current;
          if (!canvas || !containerRef.current) return;

          const updateZoom = () => {
            const containerWidth = containerRef.current.clientWidth - 60;
            const containerHeight = containerRef.current.clientHeight - 60;
            
            const zoomX = containerWidth / width;
            const zoomY = containerHeight / height;
            const newZoom = Math.min(zoomX, zoomY, 1.2);
            
            setZoom(newZoom);
            canvas.setDimensions({ 
              width: width * newZoom, 
              height: height * newZoom 
            });
            canvas.setZoom(newZoom);
            canvas.requestRenderAll();
          };

          updateZoom();
          window.addEventListener('resize', updateZoom);

          const resizeObserver = new ResizeObserver(updateZoom);
          resizeObserver.observe(containerRef.current);

          return () => {
            window.removeEventListener('resize', updateZoom);
            resizeObserver.disconnect();
          };
        }, [width, height]);

        useEffect(() => {
          const canvas = canvasInstanceRef.current;
          if (!canvas) return;

          const isRearPanel = (obj) => {
            const center = obj.getCenterPoint();
            if (foldOrientation === 'horizontal') {
              return center.y < height / 2;
            } else {
              return center.x < width / 2;
            }
          };

          const syncMirroredCopy = (parent) => {
            if (!isSymmetric || parent.isMirroredCopy) return;

            const objects = canvas.getObjects();
            let copy = objects.find(o => o.parentId === parent.id);

            if (!copy) {
              parent.clone((cloned) => {
                cloned.set({
                  parentId: parent.id,
                  isMirroredCopy: true,
                  selectable: false,
                  evented: false,
                  hasControls: false,
                  hasBorders: false,
                });
                canvas.add(cloned);
                copy = cloned;
                updatePosition(parent, copy);
              });
            } else {
              updatePosition(parent, copy);
            }
          };

          const updatePosition = (parent, copy) => {
            const mirroredLeft = width - parent.left;
            const mirroredTop = height - parent.top;
            const mirroredAngle = (parent.angle + 180) % 360;

            copy.set({
              left: mirroredLeft,
              top: mirroredTop,
              angle: mirroredAngle,
              scaleX: parent.scaleX,
              scaleY: parent.scaleY,
              flipX: parent.flipX,
              flipY: parent.flipY,
            });

            if (parent.type === 'text' || parent.type === 'i-text') {
              copy.set({
                text: parent.text,
                textTemplate: parent.textTemplate,
                fontFamily: parent.fontFamily,
                fontSize: parent.fontSize,
                fill: parent.fill,
                fontWeight: parent.fontWeight,
                fontStyle: parent.fontStyle,
                textAlign: parent.textAlign,
                width: parent.width,
                height: parent.height,
              });
            }

            copy.setCoords();
            canvas.requestRenderAll();
          };

          const handleObjectModified = (e) => {
            const obj = e.target;
            if (!obj) return;

            if (!isSymmetric) {
              const inRear = isRearPanel(obj);
              const currentPanel = obj.panelState || 'front';
              const targetPanel = inRear ? 'rear' : 'front';

              if (currentPanel !== targetPanel) {
                obj.set({
                  angle: (obj.angle + 180) % 360,
                  panelState: targetPanel,
                });
                obj.setCoords();
                canvas.requestRenderAll();
              }
            }

            if (isSymmetric) {
              const inRear = isRearPanel(obj);
              if (inRear && !obj.isMirroredCopy) {
                if (foldOrientation === 'horizontal') {
                  obj.set({ top: Math.max(height / 2 + 30, obj.top) });
                } else {
                  obj.set({ left: Math.max(width / 2 + 30, obj.left) });
                }
                obj.setCoords();
              }
              syncMirroredCopy(obj);
            }
          };

          const handleObjectAdded = (e) => {
            const obj = e.target;
            if (!obj || obj.isMirroredCopy) return;

            if (!obj.id) {
              obj.id = 'obj_' + Math.random().toString(36).substr(2, 9);
            }

            if (obj.originX !== 'center') {
              obj.set({
                originX: 'center',
                originY: 'center',
              });
            }

            if (isSymmetric) {
              const inRear = isRearPanel(obj);
              if (inRear) {
                if (foldOrientation === 'horizontal') {
                  obj.set({ top: height * 0.75 });
                } else {
                  obj.set({ left: width * 0.75 });
                }
                obj.setCoords();
              }
              syncMirroredCopy(obj);
            } else {
              obj.set({ panelState: isRearPanel(obj) ? 'rear' : 'front' });
            }
          };

          const handleObjectRemoved = (e) => {
            const obj = e.target;
            if (!obj || obj.isMirroredCopy) return;

            const copy = canvas.getObjects().find(o => o.parentId === obj.id);
            if (copy) {
              canvas.remove(copy);
            }
          };

          canvas.on('object:modified', handleObjectModified);
          canvas.on('object:moving', handleObjectModified);
          canvas.on('object:scaling', handleObjectModified);
          canvas.on('object:rotating', handleObjectModified);
          canvas.on('text:changed', handleObjectModified);
          canvas.on('object:added', handleObjectAdded);
          canvas.on('object:removed', handleObjectRemoved);

          if (isSymmetric) {
            canvas.getObjects().forEach(o => {
              if (!o.isMirroredCopy && isRearPanel(o)) {
                canvas.remove(o);
              }
            });
            canvas.getObjects().forEach(o => {
              if (!o.isMirroredCopy && !isRearPanel(o)) {
                syncMirroredCopy(o);
              }
            });
          } else {
            canvas.getObjects().forEach(o => {
              if (o.isMirroredCopy) {
                o.set({
                  isMirroredCopy: false,
                  selectable: true,
                  evented: true,
                  hasControls: true,
                  hasBorders: true,
                  panelState: 'rear'
                });
                delete o.parentId;
              }
            });
            canvas.requestRenderAll();
          }

          return () => {
            canvas.off('object:modified', handleObjectModified);
            canvas.off('object:moving', handleObjectModified);
            canvas.off('object:scaling', handleObjectModified);
            canvas.off('object:rotating', handleObjectModified);
            canvas.off('text:changed', handleObjectModified);
            canvas.off('object:added', handleObjectAdded);
            canvas.off('object:removed', handleObjectRemoved);
          };
        }, [isSymmetric, foldOrientation, width, height]);

        useEffect(() => {
          const canvas = canvasInstanceRef.current;
          if (!canvas) return;

          const objects = canvas.getObjects();
          
          objects.forEach(obj => {
            if (obj.type === 'text' || obj.type === 'i-text') {
              if (previewData) {
                if (obj.textTemplate === undefined) {
                  obj.textTemplate = obj.text;
                }
                
                let mergedText = obj.textTemplate;
                const matches = mergedText.match(/\{\{([^}]+)\}\}/g) || [];
                
                matches.forEach(match => {
                  const columnName = match.replace(/\{\{|\}\}/g, '').trim();
                  const replacementValue = previewData[columnName] !== undefined ? previewData[columnName] : match;
                  mergedText = mergedText.replace(match, replacementValue);
                });
                
                obj.set({ text: mergedText });
                
                if (autoShrinkText) {
                  autoShrinkText(obj);
                }
              } else {
                if (obj.textTemplate !== undefined) {
                  obj.set({ text: obj.textTemplate });
                  if (obj.originalFontSize) {
                    obj.set({ fontSize: obj.originalFontSize });
                  }
                }
              }
              obj.setCoords();
            }
          });

          canvas.requestRenderAll();
        }, [previewData, width, height]);

        return (
          <div 
            className="canvas-container-outer" 
            ref={containerRef}
            style={{ width: '100%', height: '100%' }}
          >
            <div 
              className="canvas-viewport-shadow"
              style={{ 
                width: width * zoom, 
                height: height * zoom,
              }}
            >
              <canvas ref={canvasRef} />
              
              <div 
                className={`canvas-fold-line ${foldOrientation}`}
                style={
                  foldOrientation === 'horizontal' 
                    ? { width: width * zoom, top: (height / 2) * zoom }
                    : { height: height * zoom, left: (width / 2) * zoom }
                }
              />
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // ExcelMapper Component
      // ----------------------------------------------------
      function ExcelMapper({
        canvasInstance, excelData, setExcelData,
        mapping, setMapping, previewIndex, setPreviewIndex,
        isPreviewActive, setIsPreviewActive, onGeneratePdf, isGeneratingPdf
      }) {
        const [dragActive, setDragActive] = useState(false);
        const [excelColumns, setExcelColumns] = useState([]);
        const [canvasPlaceholders, setCanvasPlaceholders] = useState([]);
        const [fileName, setFileName] = useState('');

        useEffect(() => {
          const canvas = canvasInstance.current;
          if (!canvas) return;

          const scanCanvasPlaceholders = () => {
            const placeholders = new Set();
            const objects = canvas.getObjects();
            
            objects.forEach(obj => {
              if (obj.type === 'text' || obj.type === 'i-text') {
                const textToScan = obj.textTemplate !== undefined ? obj.textTemplate : obj.text;
                const matches = textToScan.match(/\{\{([^}]+)\}\}/g) || [];
                matches.forEach(m => {
                  placeholders.add(m.replace(/\{\{|\}\}/g, '').trim());
                });
              }
            });
            
            const placeholdersArray = Array.from(placeholders);
            setCanvasPlaceholders(placeholdersArray);

            setMapping(prev => {
              const newMapping = { ...prev };
              placeholdersArray.forEach(ph => {
                if (!newMapping[ph] && excelColumns.length > 0) {
                  const match = excelColumns.find(c => c.toLowerCase() === ph.toLowerCase());
                  if (match) {
                    newMapping[ph] = match;
                  }
                }
              });
              return newMapping;
            });
          };

          scanCanvasPlaceholders();
          
          canvas.on('object:added', scanCanvasPlaceholders);
          canvas.on('object:removed', scanCanvasPlaceholders);
          canvas.on('text:changed', scanCanvasPlaceholders);

          return () => {
            canvas.off('object:added', scanCanvasPlaceholders);
            canvas.off('object:removed', scanCanvasPlaceholders);
            canvas.off('text:changed', scanCanvasPlaceholders);
          };
        }, [canvasInstance, excelColumns]);

        const processExcelFile = (file) => {
          setFileName(file.name);
          const reader = new FileReader();
          
          reader.onload = (e) => {
            try {
              const data = new Uint8Array(e.target.result);
              const workbook = XLSX.read(data, { type: 'array' });
              
              const firstSheetName = workbook.SheetNames[0];
              const worksheet = workbook.Sheets[firstSheetName];
              
              const json = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
              
              if (json.length === 0) {
                throw new Error('Spreadsheet appears to be empty.');
              }

              setExcelData(json);
              
              const headers = Object.keys(json[0]);
              setExcelColumns(headers);
              setPreviewIndex(0);
              
              const initialMapping = {};
              canvasPlaceholders.forEach(ph => {
                const matchedCol = headers.find(col => col.toLowerCase().trim() === ph.toLowerCase().trim());
                if (matchedCol) {
                  initialMapping[ph] = matchedCol;
                }
              });
              setMapping(initialMapping);

            } catch (error) {
              alert(`Error parsing Excel file: ${error.message}`);
            }
          };
          
          reader.readAsArrayBuffer(file);
        };

        const handleDrag = (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (e.type === 'dragenter' || e.type === 'dragover') {
            setDragActive(true);
          } else if (e.type === 'dragleave') {
            setDragActive(false);
          }
        };

        const handleDrop = (e) => {
          e.preventDefault();
          e.stopPropagation();
          setDragActive(false);
          
          if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            const file = e.dataTransfer.files[0];
            const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            if (['.xlsx', '.xls', '.csv'].includes(ext)) {
              processExcelFile(file);
            } else {
              alert('Invalid file format. Please upload an Excel (.xlsx, .xls) or CSV file.');
            }
          }
        };

        const handleFileChange = (e) => {
          if (e.target.files && e.target.files[0]) {
            processExcelFile(e.target.files[0]);
          }
        };

        const handleMappingChange = (placeholder, column) => {
          setMapping(prev => ({
            ...prev,
            [placeholder]: column
          }));
        };

        const togglePreview = () => {
          if (excelData.length === 0) {
            alert('Please upload an Excel data file first.');
            return;
          }
          setIsPreviewActive(!isPreviewActive);
        };

        const handlePrev = () => {
          if (previewIndex > 0) {
            setPreviewIndex(previewIndex - 1);
          }
        };

        const handleNext = () => {
          if (previewIndex < excelData.length - 1) {
            setPreviewIndex(previewIndex + 1);
          }
        };

        return (
          <div className="data-panel">
            <div 
              className={`excel-dropzone ${dragActive ? 'drag-active' : ''}`}
              onDragEnter={handleDrag}
              onDragOver={handleDrag}
              onDragLeave={handleDrag}
              onDrop={handleDrop}
              onClick={() => document.getElementById('excel-file-picker').click()}
            >
              <Icons.FileSpreadsheet />
              {excelData.length > 0 ? (
                <div className="excel-mapped-info">
                  <span className="excel-filename">
                    <Icons.Check /> {fileName}
                  </span>
                  <p style={{ margin: 0 }}>{excelData.length} records parsed.</p>
                  <span style={{ fontSize: '9px' }}>Click to replace file</span>
                </div>
              ) : (
                <>
                  <p>Drag Excel/CSV sheet here</p>
                  <span>or click to browse local files</span>
                </>
              )}
              <input 
                id="excel-file-picker"
                type="file" 
                accept=".xlsx,.xls,.csv"
                onChange={handleFileChange}
                style={{ display: 'none' }}
              />
            </div>

            <div style={{ display: 'flex', flexDirection: 'column', gap: '14px', height: '100%', justifyContent: 'center' }}>
              <div className="mapping-controls-container">
                <div className="mapping-fields-grid">
                  {canvasPlaceholders.length === 0 ? (
                    <div style={{ color: 'var(--text-muted)', fontSize: '13px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                      <Icons.AlertCircle />
                      <span>No Merge Placeholders (e.g. <code>{"{{Name}}"}</code>) found on canvas yet.</span>
                    </div>
                  ) : (
                    canvasPlaceholders.map(ph => (
                      <div key={ph} className="mapping-field-box">
                        <span className="mapping-field-name">{"{{" + ph + "}}"}</span>
                        <span>➜</span>
                        {excelData.length === 0 ? (
                          <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Upload data to map</span>
                        ) : (
                          <select
                            className="mapping-field-select"
                            value={mapping[ph] || ''}
                            onChange={(e) => handleMappingChange(ph, e.target.value)}
                          >
                            <option value="">-- Choose Column --</option>
                            {excelColumns.map(col => (
                              <option key={col} value={col}>{col}</option>
                            ))}
                          </select>
                        )}
                      </div>
                    ))
                  )}
                </div>

                {excelData.length > 0 && (
                  <div className="preview-carousel">
                    <button 
                      className="btn btn-secondary"
                      style={{ padding: '6px 12px', background: isPreviewActive ? 'var(--accent-glow)' : '' }}
                      onClick={togglePreview}
                    >
                      <Icons.Play style={{ fill: isPreviewActive ? 'var(--accent)' : 'none' }} />
                      <span style={{ marginLeft: '6px' }}>{isPreviewActive ? 'Preview ON' : 'Preview OFF'}</span>
                    </button>
                    
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                      <button 
                        className="carousel-btn"
                        onClick={handlePrev}
                        disabled={!isPreviewActive || previewIndex === 0}
                      >
                        <Icons.ChevronLeft />
                      </button>
                      
                      <span className="carousel-info">
                        Row {previewIndex + 1} of {excelData.length}
                      </span>

                      <button 
                        className="carousel-btn"
                        onClick={handleNext}
                        disabled={!isPreviewActive || previewIndex === excelData.length - 1}
                      >
                        <Icons.ChevronRight />
                      </button>
                    </div>
                  </div>
                )}
              </div>

              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '12px' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', background: 'rgba(245, 158, 11, 0.08)', border: '1px solid rgba(245, 158, 11, 0.2)', padding: '8px 14px', borderRadius: 'var(--radius-md)', maxWidth: '560px' }}>
                  <Icons.AlertTriangle />
                  <span style={{ fontSize: '11px', color: 'var(--text-secondary)', lineHeight: '1.4' }}>
                    <strong>Printer Setting Notice:</strong> For accurate sizing and fold lines, always print the PDF at <strong>Actual Size (100% Scale)</strong>. Do not select "Fit to Printable Area".
                  </span>
                </div>

                <button 
                  className="btn btn-primary"
                  style={{ padding: '12px 24px', fontSize: '15px' }}
                  disabled={excelData.length === 0 || isGeneratingPdf}
                  onClick={onGeneratePdf}
                >
                  <Icons.FileText />
                  <span>{isGeneratingPdf ? 'Generating PDF...' : `Compile ${excelData.length > 0 ? excelData.length : ''} Cards PDF`}</span>
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // WalkthroughOverlay Component
      // ----------------------------------------------------
      function WalkthroughOverlay({ onClose }) {
        const [currentStep, setCurrentStep] = useState(0);

        const steps = [
          {
            title: "Set Paper Size & Folds",
            description: "Choose your paper size (A4, A5, Letter, or Custom) and orientation. In Symmetric Mode, designing the bottom panel automatically duplicates and mirrors (180° rotated) elements to the rear panel so they print correctly folded.",
            icon: <Icons.Layout />,
            media: (
              <div style={{ display: 'flex', flexDirection: 'column', width: '100%', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
                <div style={{ width: '120px', height: '80px', border: '2px solid var(--text-muted)', borderRadius: '4px', position: 'relative', background: 'var(--bg-card)' }}>
                  <div style={{ position: 'absolute', top: '50%', left: 0, right: 0, borderTop: '2px dashed var(--accent)', transform: 'translateY(-50%)' }} />
                  <div style={{ position: 'absolute', bottom: '10px', left: 0, right: 0, textAlign: 'center', fontSize: '9px', fontWeight: 'bold' }}>FRONT</div>
                  <div style={{ position: 'absolute', top: '10px', left: 0, right: 0, textAlign: 'center', fontSize: '9px', fontWeight: 'bold', transform: 'rotate(180deg)' }}>REAR</div>
                </div>
                <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Symmetric fold setup</span>
              </div>
            )
          },
          {
            title: "Design with Placeholders",
            description: "Add static text, logo images, or specialized Merge Fields. Type text inside double curly brackets, e.g. {{First Name}} or {{Table}}, to mark them as placeholders for spreadsheet dynamic mapping.",
            icon: <Icons.Type />,
            media: (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', alignItems: 'center' }}>
                <div style={{ background: 'var(--bg-app)', border: '1px solid var(--border-color)', padding: '10px 20px', borderRadius: 'var(--radius-md)', fontFamily: 'var(--font-mono)', fontSize: '16px', color: 'var(--accent)', fontWeight: 'bold' }}>
                  {"{{Guest Name}}"}
                </div>
                <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Merge fields on canvas</span>
              </div>
            )
          },
          {
            title: "Drop Your Excel Sheet",
            description: "Ingest your guest list by dragging and dropping an .xlsx, .xls, or .csv file into the bottom dropzone. Our client-side parser reads the rows locally; none of your data ever leaves your computer.",
            icon: <Icons.FileSpreadsheet />,
            media: (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', alignItems: 'center' }}>
                <div style={{ border: '2px dashed var(--accent)', borderRadius: 'var(--radius-md)', padding: '12px 24px', background: 'var(--accent-glow)', display: 'flex', alignItems: 'center', gap: '10px' }}>
                  <Icons.FileSpreadsheet />
                  <div style={{ textAlign: 'left' }}>
                    <div style={{ fontSize: '12px', fontWeight: 'bold' }}>guests.xlsx</div>
                    <div style={{ fontSize: '9px', color: 'var(--text-muted)' }}>First_Name | Table_Number</div>
                  </div>
                </div>
                <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Local sheet parser</span>
              </div>
            )
          },
          {
            title: "Map & Compile PDF",
            description: "Pair canvas fields (e.g. {{Guest Name}}) with Excel columns via dropdown mapping. Toggle preview mode, paginate through records to ensure names auto-shrink safely, and click Compile to export a print-ready vector PDF.",
            icon: <Icons.FileText />,
            media: (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', alignItems: 'center', width: '100%' }}>
                <div style={{ display: 'flex', gap: '8px', fontSize: '12px', alignItems: 'center', background: 'var(--bg-app)', padding: '6px 12px', borderRadius: '4px', border: '1px solid var(--border-color)' }}>
                  <span style={{ fontWeight: 'bold', color: 'var(--accent)' }}>{"{{Guest Name}}"}</span>
                  <span>➜</span>
                  <span style={{ background: 'var(--bg-card)', padding: '2px 6px', border: '1px solid var(--border-color)', borderRadius: '3px', fontWeight: '500' }}>First_Name</span>
                </div>
                <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>Map headers & print</span>
              </div>
            )
          }
        ];

        const handleNext = () => {
          if (currentStep < steps.length - 1) {
            setCurrentStep(currentStep + 1);
          } else {
            onClose();
          }
        };

        const handleBack = () => {
          if (currentStep > 0) {
            setCurrentStep(currentStep - 1);
          }
        };

        const current = steps[currentStep];

        return (
          <div className="walkthrough-overlay">
            <div className="walkthrough-modal" style={{ animation: 'slideUp 0.3s ease-out' }}>
              <button className="walkthrough-close" onClick={onClose} aria-label="Skip walkthrough">
                <Icons.X />
              </button>
              
              <div className="walkthrough-header">
                <div style={{ width: '48px', height: '48px', background: 'var(--accent-glow)', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--accent)' }}>
                  {current.icon}
                </div>
                <span className="walkthrough-step-counter">Step {currentStep + 1} of {steps.length}</span>
              </div>
              
              <div className="walkthrough-body">
                <h2 style={{ fontSize: '20px', fontWeight: '700', color: 'var(--text-primary)', marginBottom: '10px' }}>{current.title}</h2>
                <p style={{ fontSize: '13px', color: 'var(--text-secondary)', lineHeight: '1.6' }}>{current.description}</p>
              </div>
              
              <div className="walkthrough-media">
                {current.media}
              </div>
              
              <div className="walkthrough-footer">
                <button 
                  className="btn btn-secondary" 
                  onClick={handleBack}
                  style={{ visibility: currentStep === 0 ? 'hidden' : 'visible' }}
                >
                  <Icons.ChevronLeft />
                  <span>Back</span>
                </button>
                
                <button className="btn btn-primary" onClick={handleNext}>
                  {currentStep === steps.length - 1 ? (
                    <>
                      <span>Let's Start!</span>
                      <Icons.Check />
                    </>
                  ) : (
                    <>
                      <span>Next</span>
                      <Icons.ChevronRight />
                    </>
                  )}
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // Main App Orchestrator Component
      // ----------------------------------------------------
      function App() {
        const canvasInstanceRef = useRef(null);

        const [paperSize, setPaperSize] = useState('A4');
        const [customWidth, setCustomWidth] = useState(210);
        const [customHeight, setCustomHeight] = useState(148);
        const [paperUnit, setPaperUnit] = useState('mm');
        const [orientation, setOrientation] = useState('landscape');
        const [isSymmetric, setIsSymmetric] = useState(true);

        const [excelData, setExcelData] = useState([]);
        const [mapping, setMapping] = useState({});
        const [previewIndex, setPreviewIndex] = useState(0);
        const [isPreviewActive, setIsPreviewActive] = useState(false);

        const [missingAssets, setMissingAssets] = useState({ fonts: [], images: [] });
        const [showWalkthrough, setShowWalkthrough] = useState(true);
        const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);
        const [selectedObject, setSelectedObject] = useState(null);

        const [dimensions, setDimensions] = useState({ width: 891, height: 630 });

        const foldOrientation = orientation === 'landscape' ? 'horizontal' : 'vertical';

        useEffect(() => {
          const MM_TO_PX = 3;
          let w = 297;
          let h = 210;

          if (paperSize === 'A4') {
            w = orientation === 'landscape' ? 297 : 210;
            h = orientation === 'landscape' ? 210 : 297;
          } else if (paperSize === 'A5') {
            w = orientation === 'landscape' ? 210 : 148;
            h = orientation === 'landscape' ? 148 : 210;
          } else if (paperSize === 'Letter') {
            const wMm = 215.9;
            const hMm = 279.4;
            w = orientation === 'landscape' ? hMm : wMm;
            h = orientation === 'landscape' ? wMm : hMm;
          } else {
            let customWMm = customWidth;
            let customHMm = customHeight;
            if (paperUnit === 'in') {
              customWMm = customWidth * 25.4;
              customHMm = customHeight * 25.4;
            }
            w = orientation === 'landscape' ? Math.max(customWMm, customHMm) : Math.min(customWMm, customHMm);
            h = orientation === 'landscape' ? Math.min(customWMm, customHMm) : Math.max(customWMm, customHMm);
          }

          const newWidth = Math.round(w * MM_TO_PX);
          const newHeight = Math.round(h * MM_TO_PX);
          setDimensions({ width: newWidth, height: newHeight });

          const canvas = canvasInstanceRef.current;
          if (canvas) {
            const oldW = canvas.width;
            const oldH = canvas.height;
            
            canvas.setDimensions({ width: newWidth, height: newHeight });
            
            canvas.getObjects().forEach(obj => {
              if (obj.isMirroredCopy) return;
              const scaleXRatio = newWidth / oldW;
              const scaleYRatio = newHeight / oldH;
              obj.set({
                left: obj.left * scaleXRatio,
                top: obj.top * scaleYRatio
              });
              obj.setCoords();
            });
            canvas.requestRenderAll();
          }
        }, [paperSize, customWidth, customHeight, paperUnit, orientation]);

        const autoShrinkText = (textObj) => {
          if (!textObj.maxWidth) {
            textObj.maxWidth = textObj.width * (textObj.scaleX || 1);
          }
          if (!textObj.originalFontSize) {
            textObj.originalFontSize = textObj.fontSize;
          }

          let size = textObj.originalFontSize;
          textObj.set({ fontSize: size });
          textObj.setCoords();

          while (textObj.width > textObj.maxWidth && size > 6) {
            size -= 1;
            textObj.set({ fontSize: size });
            textObj.setCoords();
          }
        };

        const handleExportTemplate = () => {
          const canvas = canvasInstanceRef.current;
          if (!canvas) return;

          const exportObjects = canvas.getObjects()
            .filter(o => !o.isMirroredCopy)
            .map(o => {
              const baseProps = {
                type: o.type,
                left: o.left,
                top: o.top,
                scaleX: o.scaleX,
                scaleY: o.scaleY,
                angle: o.angle,
                opacity: o.opacity,
                originX: o.originX,
                originY: o.originY,
              };

              if (o.type === 'text' || o.type === 'i-text') {
                return {
                  ...baseProps,
                  text: o.text,
                  textTemplate: o.textTemplate !== undefined ? o.textTemplate : o.text,
                  fontFamily: o.fontFamily,
                  fontSize: o.fontSize,
                  originalFontSize: o.originalFontSize || o.fontSize,
                  fontWeight: o.fontWeight,
                  fontStyle: o.fontStyle,
                  textAlign: o.textAlign,
                  fill: o.fill,
                  maxWidth: o.maxWidth || (o.width * (o.scaleX || 1)),
                };
              } else if (o.type === 'image') {
                return {
                  ...baseProps,
                  isPlaceholder: true,
                  fileName: o.fileName || 'logo.png',
                  originalWidth: o.width,
                  originalHeight: o.height,
                };
              }
              return baseProps;
            });

          const template = {
            version: '1.0.0',
            layout: {
              paperSize,
              customWidth,
              customHeight,
              paperUnit,
              orientation,
              isSymmetric,
            },
            objects: exportObjects,
          };

          const blob = new Blob([JSON.stringify(template, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `tentcard_template_${paperSize.toLowerCase()}.json`;
          a.click();
          URL.revokeObjectURL(url);
        };

        const handleImportTemplate = (e) => {
          const canvas = canvasInstanceRef.current;
          if (!canvas || !e.target.files || !e.target.files[0]) return;

          const file = e.target.files[0];
          const reader = new FileReader();

          reader.onload = async (event) => {
            try {
              const template = JSON.parse(event.target.result);
              if (!template.layout || !template.objects) throw new Error('Invalid template schema');

              setPaperSize(template.layout.paperSize);
              setCustomWidth(template.layout.customWidth);
              setCustomHeight(template.layout.customHeight);
              setPaperUnit(template.layout.paperUnit);
              setOrientation(template.layout.orientation);
              setIsSymmetric(template.layout.isSymmetric);

              canvas.clear();
              canvas.backgroundColor = '#ffffff';

              const missingFonts = [];
              const missingImages = [];

              for (let objData of template.objects) {
                if (objData.type === 'text' || objData.type === 'i-text') {
                  const fontName = objData.fontFamily;
                  const isStandard = ['Arial', 'Helvetica', 'Times New Roman', 'Georgia'].includes(fontName);
                  
                  if (!isStandard && !isFontLoaded(fontName)) {
                    try {
                      const fontId = fontName.toLowerCase().replace(/\s+/g, '-');
                      await loadGoogleFont(fontId);
                    } catch (err) {
                      missingFonts.push(fontName);
                    }
                  }

                  const text = new fabric.IText(objData.text, {
                    ...objData,
                    textTemplate: objData.textTemplate,
                    originalFontSize: objData.originalFontSize,
                  });
                  canvas.add(text);

                } else if (objData.type === 'image' || objData.isPlaceholder) {
                  const rectWidth = objData.originalWidth ? objData.originalWidth * objData.scaleX : 150;
                  const rectHeight = objData.originalHeight ? objData.originalHeight * objData.scaleY : 150;

                  const placeholderRect = new fabric.Rect({
                    fill: 'rgba(170, 59, 255, 0.05)',
                    stroke: 'rgba(170, 59, 255, 0.5)',
                    strokeWidth: 2,
                    strokeDashArray: [6, 6],
                    width: rectWidth,
                    height: rectHeight,
                    originX: 'center',
                    originY: 'center',
                  });

                  const placeholderText = new fabric.Text(`🎨 Missing:\n${objData.fileName}`, {
                    fontSize: 12,
                    fontFamily: 'Arial',
                    fill: '#aa3bff',
                    textAlign: 'center',
                    originX: 'center',
                    originY: 'center',
                  });

                  const placeholderGroup = new fabric.Group([placeholderRect, placeholderText], {
                    left: objData.left,
                    top: objData.top,
                    angle: objData.angle,
                    originX: 'center',
                    originY: 'center',
                    isImagePlaceholder: true,
                    placeholderFileName: objData.fileName,
                    scaleX: 1,
                    scaleY: 1,
                  });

                  canvas.add(placeholderGroup);
                  missingImages.push(objData.fileName);
                }
              }

              setMissingAssets({
                fonts: Array.from(new Set(missingFonts)),
                images: Array.from(new Set(missingImages)),
              });

              if (missingFonts.length > 0 || missingImages.length > 0) {
                canvas.setActiveObject(null);
              }
              canvas.requestRenderAll();
            } catch (err) {
              alert(`Failed to load template file: ${err.message}`);
            }
          };
          reader.readAsText(file);
          e.target.value = '';
        };

        const handleGeneratePdf = async () => {
          if (excelData.length === 0) return;
          setIsGeneratingPdf(true);
          try {
            const prevPreviewIndex = previewIndex;
            const prevPreviewActive = isPreviewActive;
            setIsPreviewActive(false);

            await generatePdf({
              canvasInstance: canvasInstanceRef,
              excelData,
              mapping,
              paperSize,
              customWidth,
              customHeight,
              paperUnit,
              orientation,
              isSymmetric,
              foldOrientation,
              autoShrinkText,
            });

            setPreviewIndex(prevPreviewIndex);
            setIsPreviewActive(prevPreviewActive);
          } catch (err) {
            alert(`PDF Generation Error: ${err.message}`);
          } finally {
            setIsGeneratingPdf(false);
          }
        };

        return (
          <div className="app-container">
            <header className="app-header">
              <div className="header-brand">
                <span style={{ fontSize: '24px' }}>🖨️</span>
                <h1>Tent Card Studio</h1>
                <span className="header-badge">UMD Static App</span>
              </div>
              <div className="header-actions">
                <button className="btn btn-secondary" onClick={() => setShowWalkthrough(true)}>
                  Quick Guide
                </button>
                <button 
                  className="btn btn-primary"
                  disabled={excelData.length === 0 || isGeneratingPdf}
                  onClick={handleGeneratePdf}
                >
                  Download compiled PDF
                </button>
              </div>
            </header>

            <div className="app-workspace">
              <Sidebar
                paperSize={paperSize}
                setPaperSize={setPaperSize}
                customWidth={customWidth}
                setCustomWidth={setCustomWidth}
                customHeight={customHeight}
                setCustomHeight={setCustomHeight}
                paperUnit={paperUnit}
                setPaperUnit={setPaperUnit}
                orientation={orientation}
                setOrientation={setOrientation}
                isSymmetric={isSymmetric}
                setIsSymmetric={setIsSymmetric}
                canvasInstance={canvasInstanceRef}
                selectedObject={selectedObject}
                setSelectedObject={setSelectedObject}
                onExportTemplate={handleExportTemplate}
                onImportTemplate={handleImportTemplate}
                missingAssets={missingAssets}
                setMissingAssets={setMissingAssets}
              />

              <main className="canvas-panel">
                <CanvasWorkspace
                  width={dimensions.width}
                  height={dimensions.height}
                  isSymmetric={isSymmetric}
                  foldOrientation={foldOrientation}
                  canvasInstanceRef={canvasInstanceRef}
                  selectedObject={selectedObject}
                  setSelectedObject={setSelectedObject}
                  previewData={isPreviewActive && excelData.length > 0 ? excelData[previewIndex] : null}
                  autoShrinkText={autoShrinkText}
                />

                <ExcelMapper
                  canvasInstance={canvasInstanceRef}
                  excelData={excelData}
                  setExcelData={setExcelData}
                  mapping={mapping}
                  setMapping={setMapping}
                  previewIndex={previewIndex}
                  setPreviewIndex={setPreviewIndex}
                  isPreviewActive={isPreviewActive}
                  setIsPreviewActive={setIsPreviewActive}
                  onGeneratePdf={handleGeneratePdf}
                  isGeneratingPdf={isGeneratingPdf}
                />
              </main>
            </div>

            {showWalkthrough && (
              <WalkthroughOverlay onClose={() => setShowWalkthrough(false)} />
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
